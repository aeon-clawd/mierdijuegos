<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Tres Cuerpos</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;touch-action:none;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none}
body{background:#000;overflow:hidden;font-family:'Courier New',monospace}
canvas{display:block}
#ui{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
#hud{position:absolute;top:10px;left:10px;color:#0ff;font-size:13px;line-height:1.6;text-shadow:0 0 8px #0ff}
#stability{position:absolute;top:10px;right:10px;text-align:right;color:#0f0;font-size:13px;text-shadow:0 0 8px #0f0}
#msg{position:absolute;bottom:60px;width:100%;text-align:center;color:#fff;font-size:18px;text-shadow:0 0 15px #fff;opacity:0;transition:opacity 0.5s}
#phase{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#fff;font-size:24px;text-align:center;text-shadow:0 0 20px #0ff;pointer-events:auto}
#phase h1{font-size:36px;margin-bottom:15px;color:#0ff}
#phase p{margin:8px 0;font-size:14px;color:#aaa;max-width:320px}
#phase .btn{display:inline-block;margin-top:20px;padding:12px 30px;border:1px solid #0ff;color:#0ff;font-family:inherit;font-size:16px;cursor:pointer;background:rgba(0,255,255,0.1);border-radius:4px}
#phase .btn:hover{background:rgba(0,255,255,0.3)}
#bar-container{position:absolute;bottom:15px;left:50%;transform:translateX(-50%);width:200px;height:8px;border:1px solid #333;border-radius:4px;overflow:hidden}
#bar{height:100%;width:0%;background:linear-gradient(90deg,#f00,#ff0,#0f0);transition:width 0.3s}
#level-label{position:absolute;bottom:28px;width:100%;text-align:center;color:#666;font-size:11px}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <div id="hud"></div>
  <div id="stability"></div>
  <div id="msg"></div>
  <div id="level-label">ESTABILIDAD ORBITAL</div>
  <div id="bar-container"><div id="bar"></div></div>
  <div id="phase">
    <h1>TRES CUERPOS</h1>
    <p>Dos estrellas orbitan entre sí.<br>Tú eres el tercer cuerpo.</p>
    <p style="color:#ff0">Arrastra para posicionarte y lanzarte.<br>Encuentra la órbita estable.</p>
    <p style="color:#f66;font-size:12px">Si fallas: caos gravitacional y destrucción.</p>
    <div class="btn" id="start-btn">ENTRAR EN ÓRBITA</div>
  </div>
</div>
<script>
const C=document.getElementById('c'),X=C.getContext('2d');
let W,H,dpr;
function resize(){
  dpr=Math.min(window.devicePixelRatio||1,2);
  W=window.innerWidth;H=window.innerHeight;
  C.width=W*dpr;C.height=H*dpr;
  C.style.width=W+'px';C.style.height=H+'px';
  X.setTransform(dpr,0,0,dpr,0,0);
}
window.addEventListener('resize',resize);resize();

// Audio
const AC=new(window.AudioContext||window.webkitAudioContext)();
function playTone(f,d,t,v){const o=AC.createOscillator(),g=AC.createGain();o.type=t||'sine';o.frequency.value=f;g.gain.setValueAtTime(v||0.1,AC.currentTime);g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+d);o.connect(g);g.connect(AC.destination);o.start();o.stop(AC.currentTime+d);}
function playHum(f){const o=AC.createOscillator(),g=AC.createGain();o.type='sine';o.frequency.value=f;g.gain.value=0.03;o.connect(g);g.connect(AC.destination);o.start();return{o,g};}
function playChaos(){for(let i=0;i<5;i++)setTimeout(()=>playTone(80+Math.random()*200,0.3,'sawtooth',0.15),i*60);}
function playStable(){playTone(523,0.3,'sine',0.1);setTimeout(()=>playTone(659,0.3,'sine',0.1),150);setTimeout(()=>playTone(784,0.5,'sine',0.1),300);}

// Physics constants (from Wolfram computation)
const G=1, starMass=10, starDist=200; // pixels
const orbitalPeriod=0.9935, stableVel=3.162, escapeVel=6.325;

// Game state
let state='menu'; // menu, placing, simulating, chaos, stable, gameover
let level=1, score=0;
let stars=[],player=null,trails=[],particles=[];
let simTime=0, stabilityTimer=0, stabilityRequired=8;
let dragging=false, dragStart=null, dragEnd=null;
let cameraShake=0, hum1=null, hum2=null;

// Scale factor for physics
const PHYS_SCALE=0.01; // pixels to physics units
const VEL_SCALE=0.15;

function initLevel(){
  const cx=W/2, cy=H/2;
  const sep=starDist*(1+level*0.08);
  const angle=Math.random()*Math.PI*2;
  const orbVel=Math.sqrt(G*starMass/(sep*PHYS_SCALE))*VEL_SCALE*0.5;
  
  stars=[
    {x:cx-Math.cos(angle)*sep/2, y:cy-Math.sin(angle)*sep/2,
     vx:-Math.sin(angle)*orbVel, vy:Math.cos(angle)*orbVel,
     mass:starMass, radius:12+level, color:'#f80', trail:[]},
    {x:cx+Math.cos(angle)*sep/2, y:cy+Math.sin(angle)*sep/2,
     vx:Math.sin(angle)*orbVel, vy:-Math.cos(angle)*orbVel,
     mass:starMass*(1+level*0.1), radius:10+level, color:'#48f', trail:[]}
  ];
  
  // Add more stars at higher levels
  if(level>=4){
    const a2=angle+Math.PI/2;
    stars.push({
      x:cx+Math.cos(a2)*sep*0.7, y:cy+Math.sin(a2)*sep*0.7,
      vx:-Math.sin(a2)*orbVel*0.8, vy:Math.cos(a2)*orbVel*0.8,
      mass:starMass*0.5, radius:8, color:'#f4f', trail:[]
    });
  }
  
  player=null;trails=[];particles=[];
  simTime=0;stabilityTimer=0;
  cameraShake=0;
  state='placing';
  showMsg('Arrastra para posicionar y lanzar',2000);
}

function showMsg(t,dur){
  const m=document.getElementById('msg');
  m.textContent=t;m.style.opacity=1;
  setTimeout(()=>m.style.opacity=0,dur||2000);
}

// Gravitational acceleration on body at (px,py) from all other bodies
function gravAccel(px,py,excludeIdx){
  let ax=0,ay=0;
  const bodies=[...stars];
  if(player&&excludeIdx!=='player')bodies.push(player);
  
  for(let i=0;i<bodies.length;i++){
    const b=bodies[i];
    if(i===excludeIdx)continue;
    if(b===player&&excludeIdx==='player')continue;
    const dx=b.x-px, dy=b.y-py;
    const r2=dx*dx+dy*dy;
    const r=Math.sqrt(r2);
    if(r<5)continue;
    const f=G*b.mass*PHYS_SCALE*PHYS_SCALE/(r2*PHYS_SCALE);
    ax+=f*dx/r*1000;
    ay+=f*dy/r*1000;
  }
  return{ax,ay};
}

function updatePhysics(dt){
  // Update stars
  for(let i=0;i<stars.length;i++){
    const s=stars[i];
    const{ax,ay}=gravAccel(s.x,s.y,i);
    s.vx+=ax*dt;s.vy+=ay*dt;
  }
  for(const s of stars){
    s.x+=s.vx*dt;s.y+=s.vy*dt;
    s.trail.push({x:s.x,y:s.y,t:simTime});
    if(s.trail.length>300)s.trail.shift();
  }
  
  // Update player
  if(player){
    const{ax,ay}=gravAccel(player.x,player.y,'player');
    player.vx+=ax*dt;player.vy+=ay*dt;
    player.x+=player.vx*dt;player.y+=player.vy*dt;
    player.trail.push({x:player.x,y:player.y,t:simTime});
    if(player.trail.length>500)player.trail.shift();
    
    // Check collisions with stars
    for(const s of stars){
      const dx=player.x-s.x, dy=player.y-s.y;
      const dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<s.radius+player.radius){
        triggerChaos('COLISIÓN ESTELAR');
        return;
      }
    }
    
    // Check escape
    const cx=W/2,cy=H/2;
    const distCenter=Math.sqrt((player.x-cx)**2+(player.y-cy)**2);
    if(distCenter>Math.max(W,H)*0.8){
      triggerChaos('ESCAPE GRAVITACIONAL');
      return;
    }
    
    // Check stability: is player maintaining roughly constant distance to center of mass?
    if(player.trail.length>60){
      const recent=player.trail.slice(-60);
      const dists=recent.map(p=>Math.sqrt((p.x-cx)**2+(p.y-cy)**2));
      const mean=dists.reduce((a,b)=>a+b)/dists.length;
      const variance=dists.reduce((a,d)=>(a+(d-mean)**2),0)/dists.length;
      const cv=Math.sqrt(variance)/Math.max(mean,1); // coefficient of variation
      
      if(cv<0.25){
        stabilityTimer+=dt;
      }else{
        stabilityTimer=Math.max(0,stabilityTimer-dt*2);
      }
      
      // Speed check - too fast = unstable
      const speed=Math.sqrt(player.vx**2+player.vy**2);
      if(speed>15){
        stabilityTimer=Math.max(0,stabilityTimer-dt*3);
      }
    }
    
    if(stabilityTimer>=stabilityRequired){
      triggerStable();
    }
  }
  
  simTime+=dt;
}

function triggerChaos(reason){
  state='chaos';
  cameraShake=20;
  playChaos();
  
  // Explosion particles
  for(let i=0;i<80;i++){
    const a=Math.random()*Math.PI*2;
    const sp=2+Math.random()*8;
    particles.push({
      x:player.x,y:player.y,
      vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,
      life:1,color:['#f00','#f80','#ff0','#fff'][~~(Math.random()*4)],
      size:1+Math.random()*3
    });
  }
  
  // Destabilize stars
  for(const s of stars){
    s.vx+=(Math.random()-0.5)*3;
    s.vy+=(Math.random()-0.5)*3;
  }
  
  showMsg(reason,3000);
  setTimeout(()=>{
    state='gameover';
    showGameOver(false);
  },2500);
}

function triggerStable(){
  state='stable';
  playStable();
  score+=level*100+Math.floor(stabilityTimer*10);
  showMsg('¡ÓRBITA ESTABLE!',2000);
  setTimeout(()=>{
    level++;
    stabilityRequired=Math.min(8+level*0.5,15);
    initLevel();
  },2500);
}

function showGameOver(win){
  const p=document.getElementById('phase');
  p.innerHTML=`
    <h1 style="color:${win?'#0f0':'#f00'}">${win?'VICTORIA':'CAOS TOTAL'}</h1>
    <p>Nivel alcanzado: ${level}</p>
    <p>Puntuación: ${score}</p>
    <p style="font-size:12px;color:#666">El problema de los tres cuerpos no tiene<br>solución analítica general — Henri Poincaré, 1887</p>
    <div class="btn" id="retry-btn">REINTENTAR</div>
  `;
  p.style.display='block';
  document.getElementById('retry-btn').addEventListener('click',()=>{
    p.style.display='none';level=1;score=0;initLevel();
  });
  document.getElementById('retry-btn').addEventListener('touchend',e=>{
    e.preventDefault();p.style.display='none';level=1;score=0;initLevel();
  });
}

// Drawing
function drawTrail(trail,color,maxAlpha){
  if(trail.length<2)return;
  const len=trail.length;
  for(let i=1;i<len;i++){
    const a=(i/len)*(maxAlpha||0.6);
    X.strokeStyle=color.replace(')',`,${a})`).replace('rgb','rgba');
    X.lineWidth=1;
    X.beginPath();
    X.moveTo(trail[i-1].x,trail[i-1].y);
    X.lineTo(trail[i].x,trail[i].y);
    X.stroke();
  }
}

function drawStar(s){
  // Glow
  const grad=X.createRadialGradient(s.x,s.y,0,s.x,s.y,s.radius*4);
  grad.addColorStop(0,s.color+'88');
  grad.addColorStop(0.3,s.color+'33');
  grad.addColorStop(1,'transparent');
  X.fillStyle=grad;
  X.beginPath();X.arc(s.x,s.y,s.radius*4,0,Math.PI*2);X.fill();
  
  // Core
  X.fillStyle=s.color;
  X.beginPath();X.arc(s.x,s.y,s.radius,0,Math.PI*2);X.fill();
  X.fillStyle='#fff';
  X.beginPath();X.arc(s.x-s.radius*0.3,s.y-s.radius*0.3,s.radius*0.3,0,Math.PI*2);X.fill();
}

function drawPlayer(){
  if(!player)return;
  // Trail
  drawTrail(player.trail,'rgb(0,255,255)',0.5);
  
  // Glow
  const grad=X.createRadialGradient(player.x,player.y,0,player.x,player.y,player.radius*5);
  const pulse=0.5+0.5*Math.sin(simTime*3);
  grad.addColorStop(0,`rgba(0,255,255,${0.3+pulse*0.2})`);
  grad.addColorStop(0.5,'rgba(0,255,255,0.1)');
  grad.addColorStop(1,'transparent');
  X.fillStyle=grad;
  X.beginPath();X.arc(player.x,player.y,player.radius*5,0,Math.PI*2);X.fill();
  
  // Core
  X.fillStyle='#0ff';
  X.beginPath();X.arc(player.x,player.y,player.radius,0,Math.PI*2);X.fill();
  X.fillStyle='#fff';
  X.beginPath();X.arc(player.x,player.y,player.radius*0.5,0,Math.PI*2);X.fill();
}

function drawGravityField(){
  // Subtle grid distortion
  const step=40;
  X.strokeStyle='rgba(50,50,80,0.15)';
  X.lineWidth=0.5;
  for(let gx=0;gx<W;gx+=step){
    X.beginPath();
    for(let gy=0;gy<H;gy+=5){
      const{ax,ay}=gravAccel(gx,gy,-1);
      const dx=ax*0.3,dy=ay*0.3;
      if(gy===0)X.moveTo(gx+dx,gy+dy);
      else X.lineTo(gx+dx,gy+dy);
    }
    X.stroke();
  }
}

function drawLaunchPreview(){
  if(!dragging||!dragStart||!dragEnd)return;
  const dx=dragStart.x-dragEnd.x, dy=dragStart.y-dragEnd.y;
  const len=Math.sqrt(dx*dx+dy*dy);
  
  // Arrow
  X.strokeStyle='rgba(0,255,255,0.5)';
  X.lineWidth=2;
  X.setLineDash([5,5]);
  X.beginPath();
  X.moveTo(dragStart.x,dragStart.y);
  X.lineTo(dragStart.x+dx,dragStart.y+dy);
  X.stroke();
  X.setLineDash([]);
  
  // Preview dot
  X.fillStyle='rgba(0,255,255,0.3)';
  X.beginPath();X.arc(dragStart.x,dragStart.y,8,0,Math.PI*2);X.fill();
  
  // Velocity indicator
  const vel=(len*0.04).toFixed(1);
  X.fillStyle='#0ff';X.font='12px Courier New';
  X.fillText(`v=${vel}`,dragStart.x+15,dragStart.y-15);
  
  // Predicted path (simple forward euler, 30 steps)
  let px=dragStart.x, py=dragStart.y;
  let pvx=dx*0.04, pvy=dy*0.04;
  X.strokeStyle='rgba(0,255,255,0.2)';
  X.lineWidth=1;
  X.setLineDash([2,4]);
  X.beginPath();X.moveTo(px,py);
  for(let i=0;i<50;i++){
    const{ax,ay}=gravAccel(px,py,-1);
    pvx+=ax*0.5;pvy+=ay*0.5;
    px+=pvx*0.5;py+=pvy*0.5;
    X.lineTo(px,py);
  }
  X.stroke();
  X.setLineDash([]);
}

function drawParticles(){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx;p.y+=p.vy;
    p.life-=0.015;
    if(p.life<=0){particles.splice(i,1);continue;}
    X.globalAlpha=p.life;
    X.fillStyle=p.color;
    X.beginPath();X.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);X.fill();
    X.globalAlpha=1;
  }
}

function drawBackground(){
  // Stars (static)
  if(!drawBackground.cache){
    drawBackground.cache=[];
    for(let i=0;i<150;i++){
      drawBackground.cache.push({
        x:Math.random()*W,y:Math.random()*H,
        s:Math.random()*1.5,b:0.3+Math.random()*0.7
      });
    }
  }
  for(const s of drawBackground.cache){
    const flicker=s.b+Math.sin(simTime*2+s.x)*0.1;
    X.fillStyle=`rgba(255,255,255,${flicker})`;
    X.fillRect(s.x,s.y,s.s,s.s);
  }
}

function render(){
  // Camera shake
  let sx=0,sy=0;
  if(cameraShake>0){
    sx=(Math.random()-0.5)*cameraShake;
    sy=(Math.random()-0.5)*cameraShake;
    cameraShake*=0.95;
    if(cameraShake<0.5)cameraShake=0;
  }
  
  X.save();
  X.translate(sx,sy);
  
  // Clear
  X.fillStyle='#050510';
  X.fillRect(-10,-10,W+20,H+20);
  
  drawBackground();
  
  if(state!=='menu')drawGravityField();
  
  // Star trails
  for(const s of stars){
    drawTrail(s.trail,s.color.replace('#','rgb(').length?`rgb(${parseInt(s.color.slice(1,3),16)},${parseInt(s.color.slice(3,5),16)},${parseInt(s.color.slice(5,7),16)})`:s.color,0.3);
  }
  
  // Stars
  for(const s of stars)drawStar(s);
  
  // Player
  drawPlayer();
  drawLaunchPreview();
  drawParticles();
  
  // Lagrange hints (level 1-2 only)
  if(state==='placing'&&level<=2){
    const cx=(stars[0].x+stars[1].x)/2;
    const cy=(stars[0].y+stars[1].y)/2;
    const dx=stars[1].x-stars[0].x, dy=stars[1].y-stars[0].y;
    const len=Math.sqrt(dx*dx+dy*dy);
    // L4 and L5 (equilateral triangle points)
    const nx=-dy/len, ny=dx/len;
    const l4x=cx+nx*len*0.866, l4y=cy+ny*len*0.866;
    const l5x=cx-nx*len*0.866, l5y=cy-ny*len*0.866;
    
    X.strokeStyle='rgba(0,255,0,0.15)';
    X.lineWidth=1;
    X.setLineDash([3,6]);
    // L4
    X.beginPath();X.arc(l4x,l4y,15,0,Math.PI*2);X.stroke();
    X.fillStyle='rgba(0,255,0,0.1)';X.font='10px Courier New';
    X.fillText('L4',l4x+18,l4y+4);
    // L5
    X.beginPath();X.arc(l5x,l5y,15,0,Math.PI*2);X.stroke();
    X.fillText('L5',l5x+18,l5y+4);
    X.setLineDash([]);
  }
  
  X.restore();
  
  // HUD
  const hud=document.getElementById('hud');
  if(state!=='menu'){
    const speed=player?Math.sqrt(player.vx**2+player.vy**2).toFixed(1):'—';
    hud.innerHTML=`NIVEL ${level}<br>SCORE ${score}<br>v=${speed}`;
  }
  
  // Stability bar
  const bar=document.getElementById('bar');
  const pct=Math.min(100,(stabilityTimer/stabilityRequired)*100);
  bar.style.width=pct+'%';
  
  const stab=document.getElementById('stability');
  if(state==='simulating'&&stabilityTimer>0){
    stab.innerHTML=`ESTABILIDAD<br>${pct.toFixed(0)}%`;
    stab.style.color=pct>70?'#0f0':pct>30?'#ff0':'#f00';
  }else{
    stab.innerHTML='';
  }
}

function loop(){
  if(state==='simulating'||state==='chaos'){
    const dt=1/60;
    for(let i=0;i<3;i++)updatePhysics(dt); // 3x substeps
  }else if(state==='placing'){
    // Stars still orbit while placing
    const dt=1/60;
    updatePhysics(dt);
  }
  render();
  requestAnimationFrame(loop);
}

// Input
function getPos(e){
  const t=e.touches?e.touches[0]:e;
  return{x:t.clientX,y:t.clientY};
}

C.addEventListener('mousedown',e=>{if(state==='placing'){dragging=true;dragStart=getPos(e);dragEnd=getPos(e);}});
C.addEventListener('mousemove',e=>{if(dragging)dragEnd=getPos(e);});
C.addEventListener('mouseup',e=>{if(dragging)launch();});

C.addEventListener('touchstart',e=>{
  e.preventDefault();
  if(AC.state==='suspended')AC.resume();
  if(state==='placing'){dragging=true;dragStart=getPos(e);dragEnd=getPos(e);}
},{passive:false});
C.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(dragging)dragEnd={x:e.touches[0].clientX,y:e.touches[0].clientY};
},{passive:false});
C.addEventListener('touchend',e=>{e.preventDefault();if(dragging)launch();},{passive:false});

function launch(){
  if(!dragStart||!dragEnd)return;
  dragging=false;
  const dx=dragStart.x-dragEnd.x, dy=dragStart.y-dragEnd.y;
  const len=Math.sqrt(dx*dx+dy*dy);
  if(len<10){dragStart=null;dragEnd=null;return;}
  
  player={
    x:dragStart.x, y:dragStart.y,
    vx:dx*0.04, vy:dy*0.04,
    mass:0.1, radius:5,
    trail:[]
  };
  
  state='simulating';
  playTone(220,0.3,'sine',0.08);
  dragStart=null;dragEnd=null;
}

// Start
document.getElementById('start-btn').addEventListener('click',()=>{
  if(AC.state==='suspended')AC.resume();
  document.getElementById('phase').style.display='none';
  initLevel();
});
document.getElementById('start-btn').addEventListener('touchend',e=>{
  e.preventDefault();
  if(AC.state==='suspended')AC.resume();
  document.getElementById('phase').style.display='none';
  initLevel();
});

loop();
</script>
</body>
</html>
